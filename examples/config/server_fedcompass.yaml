client_configs:
  train_configs:
    trainer: NaiveTrainer
    mode: step
    num_local_steps: 20
    optim: Adam
    optim_args:
      lr: 0.003
    seed: 42
    loss_fn_path: ./loss/celoss.py
    loss_fn_name: CELoss
    do_validation: false
    do_pre_validation: false
    metric_path: ./metric/acc.py
    metric_name: accuracy
    use_dp: false
    epsilon: 1
    clip_grad: false
    clip_value: 1
    clip_norm: 1
    send_gradient: true
    train_batch_size: 64
    val_batch_size: 64
    train_data_shuffle: true
    val_data_shuffle: false
  model_configs:
    model_path: ./model/cnn.py
    model_name: CNN
    model_kwargs:
      num_channel: 1
      num_classes: 10
      num_pixel: 28
  comm_configs:
    compressor_configs:
      enable_compression: false
      lossy_compressor: SZ2
      lossless_compressor: blosc
      error_bounding_mode: REL
      error_bound: 0.001
      flat_model_dtype: np.float32
      param_cutoff: 1024
server_configs:
  scheduler: CompassScheduler
  scheduler_kwargs:
    num_clients: 10
    same_init_model: true
    max_local_steps: 100
    min_local_steps: 20
    speed_momentum: 0.9
    latest_time_factor: 1.2
  aggregator: FedCompassAggregator
  aggregator_kwargs:
    weights: equal
    staleness_fn: polynomial
    staleness_fn_kwargs:
      a: 0.5
    alpha: 0.9
    gradient_based: true
    num_clients: 10
  seed: 42
  device: cpu
  num_global_epochs: 800
  server_validation: true
  validation_data_configs:
    dataset_path: ./dataset/mnist_dataset.py
    dataset_name: get_mnist
    dataset_kwargs:
      num_clients: 10
      client_id: 0
      partition_strategy: dirichlet_nomiid
      alpha1: 5
      alpha2: 0.5
      seed: 1099
  logging_output_dirname: ./output
  logging_output_filename: result
  comm_configs:
    grpc_configs:
      server_uri: localhost:50051
      max_message_size: 1048576
      use_ssl: false
      max_workers: 32
