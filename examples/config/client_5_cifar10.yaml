train_configs:
  device: cpu
  seed: 42
  logging_id: Client5
  logging_output_dirname: ./output
  logging_output_filename: result
data_configs:
  dataset_path: ./dataset/cifar10_dataset.py
  dataset_name: get_cifar10
  dataset_kwargs:
    num_clients: 10
    client_id: 4
    partition_strategy: class_noniid
    min_classes_per_client: 3
    max_classes_per_client: 5
    class_partition_alpha: 1.0
    seed: 233
    normalize_mean:
    - 0.4914
    - 0.4822
    - 0.4465
    normalize_std:
    - 0.247
    - 0.2435
    - 0.2616
    visualization: true
    output_dirname: ./output
    output_filename: visualization.pdf
comm_configs:
  grpc_configs:
    server_uri: localhost:50051
    max_message_size: 1048576
    use_ssl: false
