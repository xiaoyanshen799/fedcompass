train_configs:
  # Device
  device: "cpu"
  # Random seed
  seed: 42
  # Logging and outputs
  logging_id: "Client1"
  logging_output_dirname: "./output"
  logging_output_filename: "result"

# Local dataset
data_configs:
  dataset_path: "./dataset/mnist_dataset.py"
  dataset_name: "get_mnist"
  dataset_kwargs:
    num_clients: 5
    client_id: 0
    partition_strategy: "dirichlet_nomiid"
    alpha1: 5
    alpha2: 0.5
    seed: 123
    visualization: True
    include_server_distribution: True
    output_dirname: "./output"
    output_filename: "visualization.pdf"

comm_configs:
  grpc_configs:
    server_uri: localhost:50051
    max_message_size: 1048576
    use_ssl: False
